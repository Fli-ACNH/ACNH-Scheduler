<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Availability Form</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  body {
    background-color: #1e2329;
    color: #e2e8f0;
    font-family: 'Segoe UI', system-ui, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px;
    margin: 0;
    gap: 20px;
    user-select: none; 
  }
  
  .schedule-wrapper {
    width: 100%;
    max-width: 750px;
    overflow-x: auto; 
  }
  
  .schedule-container {
    background: #272d35;
    padding: 30px;
    border: 1px solid #3f4753;
    border-radius: 12px;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
    width: 710px; /* Widened to accommodate numbers inside blocks */
    box-sizing: border-box;
  }

  /* Timeline Header */
  .timeline {
    display: flex;
    align-items: center;
    margin-bottom: 12px;
  }
  .timeline-spacer {
    width: 100px; 
    flex-shrink: 0;
  }
  .timeline-headers {
    display: flex;
    gap: 8px; /* Aligns perfectly with the gaps between block groups */
  }
  .header-segment {
    width: 130px; /* Width of 6 blocks + 5 internal gaps */
    text-align: center;
    font-size: 13px;
    font-weight: 600;
    color: #94a3b8;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  /* Rows */
  .row {
    display: flex;
    align-items: center;
    margin-bottom: 8px;
  }
  .day-label {
    width: 100px;
    text-align: right;
    padding-right: 15px;
    font-size: 14px;
    font-weight: 500;
    color: #cbd5e1;
    flex-shrink: 0;
    box-sizing: border-box;
  }
  
  /* Blocks Track */
  .blocks {
    display: flex;
    gap: 2px;
    background-color: #1a1e24;
    padding: 4px;
    border-radius: 6px;
    border: 1px solid #333a45;
  }
  .block {
    width: 20px;
    height: 26px;
    background-color: #475569;
    border-radius: 3px;
    cursor: pointer;
    transition: background-color 0.1s, transform 0.05s, color 0.1s;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: bold;
    color: #94a3b8; /* Faded number text */
  }
  .block:hover {
    filter: brightness(1.2);
  }
  .block:active {
    transform: scale(0.9);
  }
  .block.active {
    background-color: #34d399; 
    color: #1a1e24; /* Dark number text for contrast when highlighted */
    box-shadow: 0 0 6px rgba(52, 211, 153, 0.4);
  }
  .block.divider {
    margin-left: 6px; 
  }

  /* Inputs */
  .input-group {
    margin-top: 25px;
    display: flex;
    gap: 15px;
  }
  input[type="text"], select {
    background: #1a1e24;
    color: #e2e8f0;
    border: 1px solid #3f4753;
    padding: 10px 12px;
    border-radius: 6px;
    font-size: 14px;
    width: 100%;
    box-sizing: border-box;
    font-family: inherit;
  }
  input[type="text"]:focus, select:focus {
    outline: none;
    border-color: #34d399;
  }
  
  /* Save Button */
  .save-button {
    background-color: #3b82f6;
    color: white;
    border: none;
    padding: 12px 24px;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
    font-size: 15px;
    transition: background-color 0.2s, transform 0.1s;
    box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
  }
  .save-button:hover {
    background-color: #2563eb;
    transform: translateY(-1px);
  }
</style>
</head>
<body>

<div class="schedule-wrapper">
  <div class="schedule-container" id="capture">
    
    <div class="timeline">
      <div class="timeline-spacer"></div>
      <div class="timeline-headers">
        <div class="header-segment">Night</div>
        <div class="header-segment">Morning</div>
        <div class="header-segment">Afternoon</div>
        <div class="header-segment">Evening</div>
      </div>
    </div>
    
    <div class="row"><div class="day-label">Monday</div><div class="blocks" id="day-0"></div></div>
    <div class="row"><div class="day-label">Tuesday</div><div class="blocks" id="day-1"></div></div>
    <div class="row"><div class="day-label">Wednesday</div><div class="blocks" id="day-2"></div></div>
    <div class="row"><div class="day-label">Thursday</div><div class="blocks" id="day-3"></div></div>
    <div class="row"><div class="day-label">Friday</div><div class="blocks" id="day-4"></div></div>
    <div class="row"><div class="day-label">Saturday</div><div class="blocks" id="day-5"></div></div>
    <div class="row"><div class="day-label">Sunday</div><div class="blocks" id="day-6"></div></div>

    <div class="input-group">
      <select id="timezone">
        <option value="" disabled selected>Select Your Timezone...</option>
        <option value="BST">British Summer Time (BST)</option>
        <option value="GMT">Greenwich Mean Time (GMT)</option>
        <option value="EST">Eastern Standard Time (EST)</option>
        <option value="CST">Central Standard Time (CST)</option>
        <option value="PST">Pacific Standard Time (PST)</option>
        <option value="AEST">Australian Eastern Standard Time (AEST)</option>
        <option value="JST">Japan Standard Time (JST)</option>
      </select>
      <input type="text" id="discord" placeholder="Discord: @username" autocomplete="off" />
    </div>
  </div>
</div>

<button class="save-button" onclick="downloadImage()">Save as Image</button>

<script>
  // State arrays for 168 hours in a week (7 days * 24 hours)
  let scheduleState = new Array(168).fill(false);
  let domBlocks = new Array(168);
  
  let isDragging = false;
  let toggleState = false;

  document.addEventListener('mousedown', () => isDragging = true);
  document.addEventListener('mouseup', () => isDragging = false);

  // Timezone Offset Values (relative to GMT)
  const tzOffsets = {
    "BST": 1, "GMT": 0, "EST": -5, "CST": -6, "PST": -8, "AEST": 10, "JST": 9
  };
  let currentOffset = null;

  // Generate the Grid
  for (let day = 0; day < 7; day++) {
    const container = document.getElementById('day-' + day);
    for (let hour = 0; hour < 24; hour++) {
      const index = (day * 24) + hour;
      const block = document.createElement('div');
      block.className = 'block';
      block.textContent = hour; // Adds the hour number inside the pip
      
      if (hour > 0 && hour % 6 === 0) {
        block.classList.add('divider');
      }
      
      // Paint logic
      block.addEventListener('mousedown', (e) => {
        e.preventDefault(); 
        toggleState = !scheduleState[index];
        scheduleState[index] = toggleState;
        updateBlockVisual(index);
      });

      block.addEventListener('mouseenter', () => {
        if (isDragging) {
          scheduleState[index] = toggleState;
          updateBlockVisual(index);
        }
      });

      domBlocks[index] = block;
      container.appendChild(block);
    }
  }

  // Update visual state of a specific block
  function updateBlockVisual(index) {
    domBlocks[index].classList.toggle('active', scheduleState[index]);
  }

  // Handle Timezone Shifts
  document.getElementById('timezone').addEventListener('change', (e) => {
    const newOffset = tzOffsets[e.target.value];
    
    // If a timezone was already selected, shift the blocks by the difference
    if (currentOffset !== null) {
      const shiftAmount = newOffset - currentOffset;
      let newScheduleState = new Array(168).fill(false);
      
      for (let i = 0; i < 168; i++) {
        if (scheduleState[i]) {
          // Calculate new position, handling wrap-arounds
          let newIndex = (i + shiftAmount) % 168;
          if (newIndex < 0) {
            newIndex += 168;
          }
          newScheduleState[newIndex] = true;
        }
      }
      
      scheduleState = newScheduleState;
      // Re-render all blocks with shifted data
      for (let i = 0; i < 168; i++) {
        updateBlockVisual(i);
      }
    }
    
    currentOffset = newOffset; // Lock in the new baseline
  });

  // Download functionality
  function downloadImage() {
    const element = document.getElementById("capture");
    html2canvas(element, {
      backgroundColor: "#272d35", 
      scale: 2 
    }).then(canvas => {
      const link = document.createElement("a");
      link.download = "availability-schedule.png";
      link.href = canvas.toDataURL("image/png");
      link.click();
    });
  }
</script>

</body>
</html>
